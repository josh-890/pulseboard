services:
  pulseboard:
    build: .
    environment:
      # ── Shared MinIO connection ──
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - NEXT_PUBLIC_MINIO_URL=${NEXT_PUBLIC_MINIO_URL}
      # ── Auth ──
      - SESSION_SECRET=${SESSION_SECRET}
      # ── Single-tenant fallback (used when TENANT_REGISTRY is not set) ──
      - DATABASE_URL=${DATABASE_URL:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-}
      # ── Multi-tenant registry (comma-separated tenant IDs) ──
      - TENANT_REGISTRY=${TENANT_REGISTRY:-}
      # ── Tenant: pulse ──
      - TENANT_PULSE_DATABASE_URL=${TENANT_PULSE_DATABASE_URL:-}
      - TENANT_PULSE_MINIO_BUCKET=${TENANT_PULSE_MINIO_BUCKET:-}
      - TENANT_PULSE_PASSWORD=${TENANT_PULSE_PASSWORD:-}
      - TENANT_PULSE_NAME=${TENANT_PULSE_NAME:-}
      # ── Tenant: xpulse ──
      - TENANT_XPULSE_DATABASE_URL=${TENANT_XPULSE_DATABASE_URL:-}
      - TENANT_XPULSE_MINIO_BUCKET=${TENANT_XPULSE_MINIO_BUCKET:-}
      - TENANT_XPULSE_PASSWORD=${TENANT_XPULSE_PASSWORD:-}
      - TENANT_XPULSE_NAME=${TENANT_XPULSE_NAME:-}
    networks:
      br0.20:
        ipv4_address: 10.66.20.65
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'      # leave headroom so Unraid stays responsive during build
          memory: 6g

networks:
  br0.20:
    external: true
